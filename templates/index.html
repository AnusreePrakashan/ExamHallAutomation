<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Seating System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .system-title {
            margin-bottom: 30px;
            color: #333;
        }
        .system-title h1 {
            font-weight: 700;
            margin-bottom: 10px;
        }
        .system-title p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="system-title">
            <h1>🎓 Exam Seating System</h1>
            <p>Choose your login type</p>
        </div>
        
        <a href="{{ url_for('admin_login') }}" class="btn btn-danger login-btn">
            🔐 Admin Login
        </a>
        
        <a href="{{ url_for('student_login') }}" class="btn btn-primary login-btn">
            👨‍🎓 Student Login
        </a>
        
        <a href="{{ url_for('invigilator_login') }}" class="btn btn-success login-btn">
            👨‍🏫 Invigilator Login
        </a>
        
        <div class="mt-4 text-muted">
            <small>© 2026 Exam Hall Seating Allocation System</small>
        </div>
    </div>
</body>
</html>
