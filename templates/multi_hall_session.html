{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h4>Create Multi-Hall Session</h4>
            </div>
            <div class="card-body">
                <form method="POST" id="multiHallForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Session Type</label>
                            <select name="session_type" class="form-select" required>
                                <option value="FN">FN - 9:30 AM to 11:00 AM</option>
                                <option value="AN">AN - 2:30 PM to 4:00 PM</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Exam Date</label>
                            <input type="date" name="session_date" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Select Halls (hold Ctrl/Cmd to choose multiple)</label>
                            <select name="hall_ids" class="form-select" multiple required id="hallsSelect">
                                {% for hall in halls %}
                                <option value="{{ hall.id }}" data-capacity="{{ hall.total_rows * hall.total_columns }}">
                                    {{ hall.hall_name }} ({{ hall.total_rows * hall.total_columns }} seats)
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Select Years</label>
                            <div class="d-flex gap-3 align-items-center" id="yearCheckboxes">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="years" value="1" id="y1">
                                    <label class="form-check-label" for="y1">1</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="years" value="2" id="y2">
                                    <label class="form-check-label" for="y2">2</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="years" value="3" id="y3">
                                    <label class="form-check-label" for="y3">3</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="years" value="4" id="y4">
                                    <label class="form-check-label" for="y4">4</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div id="capacityInfo"><strong>Total seats:</strong> 0</div>
                        <div id="studentCountInfo"><strong>Students:</strong> 0</div>
                        <div id="warningInfo" class="text-danger d-none"></div>
                    </div>

                    <button type="submit" class="btn btn-primary">Generate Seating</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// dynamic capacity and student count
(function(){
    const hallsSelect = document.getElementById('hallsSelect');
    const yearCheckboxes = document.querySelectorAll('input[name="years"]');
    const capacityInfo = document.getElementById('capacityInfo');
    const studentInfo = document.getElementById('studentCountInfo');
    const warningInfo = document.getElementById('warningInfo');

    function updateCapacity() {
        let total = 0;
        for (let option of hallsSelect.options) {
            if (option.selected) {
                total += parseInt(option.dataset.capacity) || 0;
            }
        }
        capacityInfo.innerHTML = `<strong>Total seats:</strong> ${total}`;
        checkWarning();
    }

    async function updateStudentCounts() {
        let total = 0;
        studentInfo.innerHTML = '';
        for (let checkbox of yearCheckboxes) {
            if (checkbox.checked) {
                try {
                    const resp = await fetch(`/admin/student_count/${checkbox.value}`);
                    const data = await resp.json();
                    studentInfo.innerHTML += `Year ${data.year}: ${data.count} students<br>`;
                    total += data.count;
                } catch (e) {
                    console.error(e);
                }
            }
        }
        studentInfo.innerHTML += `<strong>Total: ${total}</strong>`;
        checkWarning(total);
    }

    function checkWarning(studentTotal) {
        const totalSeats = Array.from(hallsSelect.options)
            .filter(o => o.selected)
            .reduce((sum,o)=> sum + (parseInt(o.dataset.capacity)||0),0);
        const students = studentTotal !== undefined ? studentTotal :
            parseInt(studentInfo.textContent.split('Total: ')[1]) || 0;
        if (students && totalSeats && students > totalSeats) {
            warningInfo.textContent = `Warning: ${students - totalSeats} students exceed capacity`;
            warningInfo.classList.remove('d-none');
        } else {
            warningInfo.classList.add('d-none');
        }
    }

    hallsSelect.addEventListener('change', updateCapacity);
    yearCheckboxes.forEach(ch => ch.addEventListener('change', updateStudentCounts));
})();
</script>
{% endblock %}
