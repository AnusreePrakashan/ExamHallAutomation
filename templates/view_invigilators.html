{% extends "admin_base.html" %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between">
        <h4>All Invigilators</h4>
        <a href="{{ url_for('add_invigilator') }}" class="btn btn-primary btn-sm">Add New</a>
    </div>
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Staff ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Availability</th>
                </tr>
            </thead>
            <tbody>
                {% for inv in invigilators %}
                <tr>
                    <td>{{ inv.staff_id }}</td>
                    <td>{{ inv.name }}</td>
                    <td>{{ inv.department or 'N/A' }}</td>
                    <td>
                        <span class="badge bg-{{ 'success' if inv.availability == 'Available' else 'danger' }}">
                            {{ inv.availability }}
                        </span>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center">No invigilators found</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
