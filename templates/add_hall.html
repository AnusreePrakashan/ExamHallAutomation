{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>Add New Hall</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Hall Name</label>
                        <input type="text" name="hall_name" class="form-control" 
                               placeholder="e.g., Hall A, Room 101" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Total Rows (5-7)</label>
                        <input type="number" name="total_rows" class="form-control" 
                               min="5" max="7" value="6" required>
                        <small class="text-muted">Columns are fixed: A, B, C, D, E, F, G, H, I</small>
                    </div>
                    
                    <div class="alert alert-info">
                        <strong>Capacity:</strong> <span id="capacity">54</span> seats (6 rows × 9 columns)
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Add Hall</button>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelector('input[name="total_rows"]').addEventListener('input', function() {
        document.getElementById('capacity').textContent = this.value * 9;
    });
</script>
{% endblock %}
